name: Deploy PR preview to GitHub Pages

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Pages source is branch deployment
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pages = await github.rest.repos.getPages({ owner, repo });
            const buildType = pages.data.build_type;
            core.info(`Current Pages build type: ${buildType}`);

            if (buildType !== "legacy") {
              const source = pages.data.source
                ? `${pages.data.source.branch}:${pages.data.source.path}`
                : "not configured";
              core.setFailed(
                `GitHub Pages is configured as "${buildType}" (${source}). ` +
                  `Set Settings > Pages > Build and deployment > Source to "Deploy from a branch", ` +
                  `then choose "gh-pages" and "/ (root)".`
              );
            }

      - name: Setup Node.js
        if: github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        if: github.event.action != 'closed'
        run: npm ci
        working-directory: web

      - name: Set preview build environment
        if: github.event.action != 'closed'
        run: |
          echo "VITE_BASE_PATH=/${{ github.event.repository.name }}/pr-preview/pr-${{ github.event.pull_request.number }}/" >> "$GITHUB_ENV"
          if [ -n "${{ vars.VITE_API_BASE_URL }}" ]; then
            echo "VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}" >> "$GITHUB_ENV"
          fi

      - name: Build preview web app
        if: github.event.action != 'closed'
        run: npm run build
        working-directory: web

      - name: Deploy/remove PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: web/dist/
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
          wait-for-pages-deployment: true
          comment: true
          qr-code: false
